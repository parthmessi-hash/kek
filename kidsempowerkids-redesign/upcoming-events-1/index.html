<!doctype html>

  <head>

            <h1 style="font-size: clamp(2rem, 4vw, 3.2rem);">Join us for a fun Easter Egg Hunt on Saturday, April 4 at 11 AM! 🐣🌸</h1>
            <p><a href="https://docs.google.com/spreadsheets/d/1P_dWo-u3IKWvH22XWopld5gg0CE5PDkpnJ8WVGTcDTs/edit?gid=0#gid=0" target="_blank" rel="noreferrer noopener">RSVP by clicking on Flyer</a></p>

          </div>
          <a class="hero__media" href="https://docs.google.com/spreadsheets/d/1P_dWo-u3IKWvH22XWopld5gg0CE5PDkpnJ8WVGTcDTs/edit?gid=0#gid=0" target="_blank" rel="noreferrer noopener">
