<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recognitions | Kids Empower Kids</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700;800&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <script src="/assets/js/site.js" defer></script>
  </head>
  <body>
    <div class="site-shell">
      <div data-site-header></div>
      <main class="site-main section-stack">
        <section class="panel">
          <div class="section-title" style="padding: 0;">
            <h1 style="font-size: clamp(2rem, 4vw, 3.2rem);">Recognitions</h1>
            <p>We are honored to celebrate the community recognition received by members of Kids Empower Kids for leadership, volunteerism, and service.</p>
          </div>
        </section>

        <section class="grid grid--2 recognitions-grid">
          <article class="recognition-card">
            <img class="recognition-card__image" src="/assets/images/recognitions/parth.jpg" alt="Certificate of Recognition for Parth Gupta" />
          </article>

          <article class="recognition-card">
            <img class="recognition-card__image" src="/assets/images/recognitions/aanya.jpg" alt="Certificate of Recognition for Aanya Remi" />
          </article>

          <article class="recognition-card">
            <img class="recognition-card__image" src="/assets/images/recognitions/nitya.jpg" alt="Certificate of Recognition for Nitya Remi" />
          </article>

          <article class="recognition-card">
            <img class="recognition-card__image" src="/assets/images/recognitions/pari.jpg" alt="Certificate of Recognition for Pari Gupta" />
          </article>
        </section>
      </main>
      <div data-site-footer></div>
    </div>
  </body>
</html>
