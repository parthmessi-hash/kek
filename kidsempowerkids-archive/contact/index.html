<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Kids Empower Kids</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@600;700;800&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <script src="/assets/js/site.js" defer></script>
  </head>
  <body>
    <div class="site-shell">
      <div data-site-header></div>
      <main class="site-main section-stack">
        <section class="contact-layout">
          <article class="contact-card">
            <div class="contact-card__body">
              <div class="section-title" style="padding: 0 0 1rem;">
                <p class="section-title__eyebrow">Contact Us</p>
                <h1 style="font-size: clamp(2rem, 4vw, 3.2rem);">CONTACT US</h1>
              </div>
              <form class="form-grid">
                <div class="field">
                  <label for="first-name">First name *</label>
                  <input id="first-name" name="first-name" type="text" required />
                </div>
                <div class="field">
                  <label for="last-name">Last name *</label>
                  <input id="last-name" name="last-name" type="text" required />
                </div>
                <div class="field">
                  <label for="email">Email *</label>
                  <input id="email" name="email" type="email" required />
                </div>
                <div class="field">
                  <label for="phone">Phone *</label>
                  <input id="phone" name="phone" type="tel" required />
                </div>
                <div class="field field--full">
                  <label for="message">Type your message here...</label>
                  <textarea id="message" name="message"></textarea>
                </div>
                <div class="field field--full">
                  <button class="button button--primary" type="submit">Submit</button>
                </div>
              </form>
            </div>
          </article>

          <aside class="contact-card">
            <div class="contact-card__body">
              <div class="feature-list">
                <div class="feature">
                  <h3>Email</h3>
                  <p><a href="mailto:kidsempowerkids.fundraiser@gmail.com">kidsempowerkids.fundraiser@gmail.com</a></p>
                </div>
                <div class="feature">
                  <h3>Phone</h3>
                  <p>Tel: 817-300-5698</p>
                  <p>Tel: 408-466-5224</p>
                </div>
              </div>
            </div>
          </aside>
        </section>
      </main>
      <div data-site-footer></div>
    </div>
  </body>
</html>
